name: vms_app
description: A demonstration and plugin for using Javascript with Flutter.
version: 0.8.1

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Core packages
  baseflow_plugin_template: ^2.1.2
  cupertino_icons: ^1.0.1+1

  # State Management
  provider: ^6.1.2
  get: ^4.6.6

  # Network & HTTP
  http: ^1.0.0
  sync_http: ^0.3.0
  dio: ^5.1.0
  url_launcher: ^6.2.6

  # Location & Maps
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  permission_handler: ^11.4.0

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.4
  firebase_messaging: ^15.2.3
  firebase_analytics: ^11.4.3

  # Local Storage & Preferences
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^18.0.1

  # Utilities
  logger: ^2.2.0
  flutter_dotenv: ^5.0.2
  crypto: ^3.0.0
  device_info_plus: ^11.2.1
  uuid: ^4.5.1
  android_id: ^0.2.0
  intl: ^0.18.1
  ffi: ^2.0.0

  # UI Components
  flutter_svg: ^2.0.7
  dotted_border: ^2.1.0
  table_calendar: ^3.0.6
  marquee: ^2.2.3

  # 추가된 필수 패키지들
  equatable: ^2.0.5           # State 비교를 위한 패키지
  flutter_bloc: ^8.1.6        # BLoC 패턴 (코드에서 사용됨)
  firebase_crashlytics: ^4.1.3 # Crashlytics (ErrorLogger에서 사용)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  assets:
    - assets/kdn/usm/img/
    - assets/kdn/ros/img/
    - assets/kdn/home/img/
    - assets/kdn/wid/img/
    - .env

  fonts:
    - family: PretendardVariable
      fonts:
        - asset: assets/kdn/font/woff2/PretendardVariable.woff2