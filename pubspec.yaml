name: vms_app
description: A demonstration and plugin for using Javascript with Flutter.
version: 0.8.1

publish_to: 'none'

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Core packages
  baseflow_plugin_template: ^2.1.2
  cupertino_icons: ^1.0.1+1

  # State Management
  provider: ^6.1.2
  get: ^4.6.6
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Network & HTTP
  http: ^1.0.0
  sync_http: ^0.3.0
  dio: ^5.1.0
  url_launcher: ^6.2.6

  # Location & Maps
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  permission_handler: ^11.4.0

  # Firebase (더 안정적인 구버전 사용)
  firebase_core: ^2.24.2        # 더 안정적인 버전
  firebase_auth: ^4.15.3        # 더 안정적인 버전
  cloud_firestore: ^4.13.6     # 더 안정적인 버전
  firebase_messaging: ^14.7.10  # 더 안정적인 버전
  firebase_analytics: ^10.7.4   # 더 안정적인 버전
  firebase_crashlytics: ^3.4.9  # 더 안정적인 버전

  # Local Storage & Preferences
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^16.3.2  # 호환 버전

  # Utilities
  logger: ^2.2.0
  flutter_dotenv: ^5.0.2
  crypto: ^3.0.0
  device_info_plus: ^10.1.2     # Firebase 호환 버전
  uuid: ^4.5.1
  android_id: ^0.2.0
  intl: ^0.18.1
  ffi: ^2.0.0

  # UI Components
  flutter_svg: ^2.0.7
  dotted_border: ^2.1.0
  table_calendar: ^3.0.6
  marquee: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/kdn/usm/img/
    - assets/kdn/ros/img/
    - assets/kdn/home/img/
    - assets/kdn/wid/img/
    - .env

  fonts:
    - family: PretendardVariable
      fonts:
        - asset: assets/kdn/font/woff2/PretendardVariable.woff2