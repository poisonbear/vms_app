plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'  // Crashlytics 플러그인 추가
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace 'kdn.vms.app'
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "kdn.vms.app"
        minSdkVersion 24  // Firebase 호환성을 위해 24로 상향 조정
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // ProGuard 설정 개선
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
            // 디버그 빌드에서는 난독화 비활성화
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // Release 빌드 최적화
            zipAlignEnabled true
            debuggable false
        }
    }

    // Lint 설정 개선
    lint {
        disable 'InvalidPackage'
        checkReleaseBuilds false
        abortOnError false
    }

    // 패키징 옵션 추가 (중복 파일 처리) - AGP 8.x 호환 문법
    packaging {
        resources {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so']
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/license.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/notice.txt',
                    'META-INF/ASL2.0',
                    'META-INF/*.kotlin_module',
                    'META-INF/gradle/incremental.annotation.processors'
            ]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Firebase BOM으로 버전 통합 관리 (더 안정적인 버전으로 변경)
    implementation platform('com.google.firebase:firebase-bom:32.2.3')  // 더 안정적인 버전

    // Firebase 서비스들 (BOM에 의해 버전 자동 관리)
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation 'com.google.firebase:firebase-messaging-ktx'
    implementation 'com.google.firebase:firebase-auth-ktx'
    implementation 'com.google.firebase:firebase-firestore-ktx'
    implementation 'com.google.firebase:firebase-crashlytics-ktx'  // Crashlytics 추가
    implementation 'com.google.firebase:firebase-core'

    // Google Play Services (더 안정적인 버전으로 조정)
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation 'com.google.android.gms:play-services-maps:18.1.0'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'
    implementation 'com.google.android.gms:play-services-base:18.2.0'

    // AndroidX 라이브러리 (오타 수정 및 호환 버전)
    implementation 'androidx.multidx:multidx:2.0.1'  // 오타 수정: multidx → multidex
    implementation 'androidx.core:core-ktx:1.10.1'   // 더 안정적인 버전
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'  // 더 안정적인 버전
    implementation 'androidx.activity:activity-compose:1.7.2'  // 더 안정적인 버전
    implementation 'androidx.annotation:annotation:1.6.0'  // 더 안정적인 버전

    // 네트워크 보안 (OkHttp) - 더 안정적인 버전
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'

    // WorkManager (백그라운드 작업용) - 더 안정적인 버전
    implementation 'androidx.work:work-runtime-ktx:2.8.1'

    // Kotlin 호환성
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10"

    // JSON 처리
    implementation 'com.google.code.gson:gson:2.10.1'

    // 추가 보안 및 안정성 - 더 안정적인 버전
    implementation 'androidx.security:security-crypto:1.0.0'
}